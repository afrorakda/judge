<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Judge</title>
    
    <link rel="icon" href="image_74.png">
    <link rel="apple-touch-icon" href="image_74.png">

    <style>
        :root {
            --main: #333;
            --bg: #fff;
            --accent: #eee;
            --radius: 15px;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg);
            color: var(--main);
            margin: 0;
            display: flex;
            justify-content: center;
            height: 100dvh;
            -webkit-font-smoothing: antialiased;
            overflow: hidden;
            user-select: none;
            -webkit-user-select: none;
        }

        .container {
            width: 100%;
            max-width: 420px;
            padding: 30px 20px;
            box-sizing: border-box;
            text-align: center;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        header { margin-bottom: 10px; }
        h1 { font-size: 1.8rem; font-weight: 800; margin-bottom: 2px; letter-spacing: -1px; }
        .subtitle { font-size: 0.8rem; color: #666; font-weight: 600; letter-spacing: 0.5px; }

        .verdict-area {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 250px; /* 位置を固定するための最小高 */
        }

        .verdict-display {
            font-size: 3.5rem;
            font-weight: 900;
            line-height: 1;
            letter-spacing: -2px;
            transition: font-size 0.1s ease, opacity 0.05s ease; /* 透明度の変化を追加 */
            opacity: 1;
        }
        .verdict-display.result {
            font-size: 8.5rem;
        }

        /* Flashアニメーション: 一瞬消えて、パッと出る */
        @keyframes flashVeridct {
            0% { opacity: 0.1; }
            100% { opacity: 1; }
        }
        .verdict-display.flashing {
            animation: flashVeridct 0.1s ease-out;
        }

        .status-msg {
            margin-top: 15px;
            font-size: 0.75rem;
            font-weight: 700;
            color: #bbb;
            text-transform: uppercase;
            letter-spacing: 2px;
            height: 1rem;
        }

        .action-btn {
            width: 100%;
            padding: 18px;
            background: var(--main);
            color: #fff;
            border: none;
            border-radius: var(--radius);
            font-size: 1.3rem;
            font-weight: 800;
            cursor: pointer;
            transition: all 0.2s;
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
        }
        .action-btn:active { transform: scale(0.96); }
        .action-btn:disabled {
            background: var(--accent);
            color: #bbb;
            cursor: not-allowed;
            transform: none;
        }

        footer { margin-top: 20px; font-size: 10px; color: #aaa; line-height: 1.6; }
        footer a { color: inherit; text-decoration: none; }
        .footer-btns { margin-top: 20px; }
        .kofi-btn {
            display: inline-block; background: var(--main); color: #fff;
            padding: 10px 20px; border-radius: var(--radius);
            text-decoration: none; font-weight: bold; font-size: 13px; margin-bottom: 10px;
        }
        .home-btn {
            display: block; width: 60%; margin: 0 auto; background: var(--accent);
            color: var(--main); border: none; padding: 8px;
            border-radius: var(--radius); font-weight: 700; font-size: 12px; cursor: pointer;
        }

        #modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.6); align-items: center; justify-content: center; z-index: 100;
        }
        .modal-content {
            background: #fff; width: 85%; max-width: 320px; padding: 30px;
            border-radius: var(--radius); text-align: left; position: relative;
            user-select: text; -webkit-user-select: text;
        }
        .close-x { position: absolute; top: 15px; right: 20px; font-size: 20px; color: #ccc; cursor: pointer; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>Judge</h1>
        <p class="subtitle">Decide Instantly.</p>
    </header>

    <div class="verdict-area">
        <div class="verdict-display" id="verdictDisplay">?</div>
        <div class="status-msg" id="statusMsg">Prepare your mind</div>
    </div>

    <div class="bottom-controls">
        <button class="action-btn" id="judgeBtn" onclick="giveVerdict()">JUDGE</button>

        <div class="footer-btns">
            <a href="https://ko-fi.com/afrorakda" target="_blank" class="kofi-btn">☕️buy me a coffee</a>
            <button class="home-btn" onclick="showModal()">Add to Home Screen</button>
        </div>

        <footer>
            <div>No login / No tracking / No ads / Browser only</div>
            <div><a href="https://afrorakda.com/privacy/">Privacy Policy</a> / afrorakda © 2026</div>
        </footer>
    </div>
</div>

<div id="modal" onclick="hideModal()">
    <div class="modal-content" onclick="event.stopPropagation()">
        <span class="close-x" onclick="hideModal()">×</span>
        <h3>📱 Install</h3>
        <p>Add to your home screen.</p>
        <p>🍏 <strong>iPhone (Safari):</strong><br>Tap Share, then Add to Home Screen.</p>
        <p>🤖 <strong>Android (Chrome):</strong><br>Tap Menu (⋮), then Add to Home Screen.</p>
    </div>
</div>

<script>
    const verdictDisplay = document.getElementById('verdictDisplay');
    const statusMsg = document.getElementById('statusMsg');
    const judgeBtn = document.getElementById('judgeBtn');

    function giveVerdict() {
        if (judgeBtn.disabled) return;

        const results = ['YES', 'NO'];
        const finalResult = results[Math.floor(Math.random() * results.length)];
        
        // Flash feedback before showing the result
        triggerFlash();
        
        // Impactful Verdict
        verdictDisplay.classList.add('result');
        verdictDisplay.textContent = finalResult;
        statusMsg.textContent = "The verdict is final.";
        
        // Force the decision for 3 seconds
        lockJudge();
    }

    function triggerFlash() {
        verdictDisplay.classList.remove('flashing'); // リセット
        void verdictDisplay.offsetWidth; // リフローを強制
        verdictDisplay.classList.add('flashing');
    }

    function lockJudge() {
        judgeBtn.disabled = true;
        let timeLeft = 3;
        
        const countdown = setInterval(() => {
            timeLeft--;
            if (timeLeft <= 0) {
                clearInterval(countdown);
                judgeBtn.disabled = false;
                resetToDefault(); // 「？」に戻す
            } else {
                statusMsg.textContent = `Locked for ${timeLeft}s`;
            }
        }, 1000);
    }

    function resetToDefault() {
        verdictDisplay.classList.remove('result');
        verdictDisplay.textContent = "?";
        statusMsg.textContent = "Ready.";
    }

    function showModal() { document.getElementById('modal').style.display = 'flex'; }
    function hideModal() { document.getElementById('modal').style.display = 'none'; }
</script>

</body>
</html>
